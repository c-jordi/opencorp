name: Secret and local-path scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    # Whole-PR bypass: add the `skip-secret-scan` label to the PR.
    if: >-
      github.event_name != 'pull_request' ||
      !contains(github.event.pull_request.labels.*.name, 'skip-secret-scan')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.21.2
        run: |
          set -euo pipefail
          curl -sSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan PR diff
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --log-opts="${BASE_SHA}..${HEAD_SHA}" \
            --redact \
            --verbose \
            --no-banner

      - name: Scan pushed commits
        if: github.event_name == 'push'
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.event.after }}
        run: |
          set -euo pipefail
          # On the very first push to a branch, `before` is all zeros; fall
          # back to a full-repo scan in that case.
          if [ "${BEFORE_SHA}" = "0000000000000000000000000000000000000000" ]; then
            gitleaks detect \
              --source . \
              --config .gitleaks.toml \
              --redact \
              --verbose \
              --no-banner
          else
            gitleaks detect \
              --source . \
              --config .gitleaks.toml \
              --log-opts="${BEFORE_SHA}..${AFTER_SHA}" \
              --redact \
              --verbose \
              --no-banner
          fi

      - name: Explain failure
        if: failure()
        run: |
          cat <<'EOF'
          Gitleaks found one or more potential secrets or local file paths.

          To resolve:
            * Remove the offending value and rotate any leaked credential.
            * If the match is a false positive on a single line, append a
              comment containing `gitleaks:allow` on that line.
            * If you need to bypass the check for an entire PR, add the
              `skip-secret-scan` label to the PR.

          See .gitleaks.toml for the active rules and allowlists.
          EOF
